version: '3.8'

services:
  db:
    container_name: oracle-xe
    image: gvenzl/oracle-xe:21.3.0
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: root_pass
      ORACLE_DATABASE: coleta_residuos
    volumes:
      - db_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'SELECT 1 FROM DUAL;' | sqlplus system/$${ORACLE_PASSWORD}@localhost/coleta_residuos"]
      interval: 20s
      timeout: 10s
      retries: 10

  api:
    build:
      context: ./coleta-residuos
      dockerfile: Dockerfile
    container_name: coleta-residuos-app
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env


volumes:
  db_data: