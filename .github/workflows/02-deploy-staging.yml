name: 02 - Deploy Staging

on:
  push:
    branches:
      - develop

env:
  IMAGE_NAME: coleta-residuos

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore coleta-residuos/coleta-residuos.csproj

      - name: Build
        run: dotnet build coleta-residuos/coleta-residuos.csproj --no-restore --configuration Release

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image to DockerHub (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./coleta-residuos/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:staging

  create-pull-request-to-main:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Create Pull Request to Main
        run: |
          gh pr create \
            --base main \
            --head develop \
            --title "PR: develop -> main" \
            --body "Pull request automatizada criada pelo workflow de deploy staging." \
            || echo "PR já existe ou não há alterações para criar"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
