name: 02 - Deploy Staging

on:
  push:
    branches:
      - develop

env:
  IMAGE_NAME: coleta-residuos

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore coleta-residuos/coleta-residuos.csproj

      - name: Build
        run: dotnet build coleta-residuos/coleta-residuos.csproj --no-restore --configuration Release

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image to DockerHub (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./coleta-residuos/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:staging

  create-pull-request-to-main:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Pull Request to Main
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'PR automatizada de develop para main'
          title: 'PR develop -> main'
          base: main
          head: develop
          delete-branch: false
