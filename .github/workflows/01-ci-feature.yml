name: 01 - CI Feature

on:
  push:
    branches:
      - 'feature/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore coleta-residuos/coleta-residuos.csproj

      - name: Build
        run: dotnet build coleta-residuos/coleta-residuos.csproj --no-restore --configuration Release

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore coleta-residuos.Tests/coleta-residuos.Tests.csproj

      - name: Test
        run: dotnet test coleta-residuos.Tests/coleta-residuos.Tests.csproj --verbosity normal

  create-pull-request:
    runs-on: ubuntu-latest
    needs: test
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'PR automatizada de ${{ github.ref_name }} para develop'
          title: 'PR ${{ github.ref_name }} -> develop'
          base: develop
          head: ${{ github.ref_name }}
          delete-branch: false
